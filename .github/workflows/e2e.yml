name: E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - uses: gacts/install-podman@v1
    
    - name: Install Podman and compose provider 
      run: |
        sudo apt-get update
        sudo apt-get install -y podman podman-compose

    - name: Run E2E tests with podman-compose
      run: |
        podman-compose up --build --exit-code-from test-runner

    - name: Upload Playwright Report (Optional)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
